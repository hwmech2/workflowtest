name: Execute Python Script

on:
  schedule:
     - cron: '*/5 * * * *'
  
  # Includes a button in the Actions tab to manually trigger the script for easy debugging
  workflow_dispatch: 

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone your repository into the runner's workspace
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up a dedicated Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies if a requirements file exists
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Execute the Python script
      - name: Run Script
        run: hello.py
